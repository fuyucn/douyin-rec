<!DOCTYPE html>
<html lang="zh-CN" data-theme="lyra">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播录制控制台</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.22/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      borderRadius: {
        none: '0', DEFAULT: '0', sm: '0', md: '0', lg: '0', xl: '0', '2xl': '0', '3xl': '0',
      }
    }
  }
}
</script>
<style>
  [data-theme="lyra"] {
    color-scheme: dark;
    --b1: 13.5% 0 0;
    --b2: 17.5% 0 0;
    --b3: 22% 0 0;
    --bc: 90% 0 0;
    --p: 88% 0 0;
    --pc: 13.5% 0 0;
    --s: 55% 0 0;
    --sc: 95% 0 0;
    --a: 65% 0 0;
    --ac: 13.5% 0 0;
    --n: 25% 0 0;
    --nc: 88% 0 0;
    --su: 72% 0.19 155;
    --suc: 13.5% 0 0;
    --er: 62% 0.22 25;
    --erc: 95% 0 0;
    --wa: 75% 0.18 80;
    --wac: 13.5% 0 0;
    --in: 67% 0.15 250;
    --inc: 95% 0 0;
    --rounded-box: 0;
    --rounded-btn: 0;
    --rounded-badge: 0;
    --tab-radius: 0;
    --animation-btn: 0;
    --btn-focus-scale: 1;
  }
  @keyframes pulse-dot { 50% { opacity: 0.3; } }
  .dot-running { animation: pulse-dot 1s infinite; }
  .log-box {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    font-size: 0.78rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
  }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: oklch(var(--b2)); }
</style>
</head>
<body class="min-h-screen bg-base-100">
<div class="max-w-4xl mx-auto px-4 py-6" id="app"></div>

<script>
const STATUS_LABELS = { pending: '待启动', running: '运行中', stopped: '已停止', error: '错误', completed: '已完成' };
const STATUS_BADGE = {
  pending:    'badge-ghost badge-outline',
  running:    'badge-success badge-outline',
  stopped:    'badge-error badge-outline',
  error:      'badge-error badge-outline',
  completed:  'badge-info badge-outline',
};

// 综合 DB status + worker_status 返回显示信息
function statusDisplay(status, workerStatus) {
  if (status === 'running' && workerStatus === '定时等待') {
    return { label: '等待时段', badgeClass: 'badge-warning badge-outline', dotClass: 'bg-warning' };
  }
  if (status === 'running' && workerStatus === '等待开播') {
    return { label: '等待开播', badgeClass: 'badge-info badge-outline', dotClass: 'bg-info dot-running' };
  }
  if (status === 'running' && workerStatus === '直播中') {
    return { label: '录制中', badgeClass: 'badge-success', dotClass: 'bg-success dot-running' };
  }
  return {
    label: STATUS_LABELS[status] || status,
    badgeClass: STATUS_BADGE[status] || 'badge-ghost',
    dotClass: status === 'running' ? 'bg-success dot-running'
            : (status === 'stopped' || status === 'error') ? 'bg-error'
            : 'bg-base-content/40',
  };
}
const LOCAL_TYPE_LABELS = { portrait: '截图筛选', highlight: '高能时刻' };
const QUALITY_LABELS = { origin: 'OD', uhd: 'UHD', hd: 'HD', sd: 'SD', ld: 'LD' };

let currentView = null;
let pollTimer = null;
let timeUpdateTimer = null;
let evtSource = null;
let _logAutoScroll = true;  // 是否自动跟随到底部

function _initLogScroll() {
  const logs = document.getElementById('logs');
  if (!logs) return;
  _logAutoScroll = true;
  logs.onscroll = () => {
    // 距底部 ≤ 40px 视为"在底部"，恢复自动滚动；否则暂停
    _logAutoScroll = logs.scrollHeight - logs.scrollTop - logs.clientHeight <= 40;
  };
}

function _appendLog(text) {
  const logs = document.getElementById('logs');
  if (!logs) return;
  logs.textContent += text + '\n';
  if (_logAutoScroll) logs.scrollTop = logs.scrollHeight;
}
let detailPreviewActive = false;
let aiBackendsCache = null;

function formatElapsed(isoStr) {
  if (!isoStr) return '-';
  const elapsed = Math.max(0, Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000));
  const h = Math.floor(elapsed / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  const s = elapsed % 60;
  if (h > 0) return `${h}h ${m}m ${s}s`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function updateElapsedTimes() {
  document.querySelectorAll('[data-elapsed-from]').forEach(el => {
    const ts = el.dataset.elapsedFrom;
    if (ts) el.textContent = formatElapsed(ts);
  });
}

// ── Hash 路由 ──────────────────────────────────────────────
function getRoute() {
  const hash = location.hash || '#/';
  let m;
  m = hash.match(/^#\/local\/task\/(\d+)$/);
  if (m) return { view: 'local-detail', id: parseInt(m[1]) };
  m = hash.match(/^#\/task\/(\d+)$/);
  if (m) return { view: 'detail', id: parseInt(m[1]) };
  if (hash === '#/local') return { view: 'local' };
  return { view: 'list' };
}

function navigate(hash) { location.hash = hash; }

window.addEventListener('hashchange', () => route());
window.addEventListener('load', () => route());

function route() {
  cleanup();
  const r = getRoute();
  if (r.view === 'detail') { currentView = 'detail'; renderDetailView(r.id); }
  else if (r.view === 'local-detail') { currentView = 'local-detail'; renderLocalDetailView(r.id); }
  else if (r.view === 'local') { currentView = 'local'; renderLocalListView(); }
  else { currentView = 'list'; renderListView(); }
}

function cleanup() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if (timeUpdateTimer) { clearInterval(timeUpdateTimer); timeUpdateTimer = null; }
  if (evtSource) { evtSource.close(); evtSource = null; }
  if (detailPreviewActive) {
    detailPreviewActive = false;
    const previewId = getRoute().id;
    if (previewId) fetch(`/api/tasks/${previewId}/preview`, { method: 'POST' }).catch(() => {});
  }
}

// ── Tab 切换 HTML ─────────────────────────────────────────
function tabsHTML(active) {
  return `
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">直播录制控制台</h1>
      <button class="btn btn-ghost btn-sm gap-1" onclick="openCookieSettings()" id="btnCookieSettings">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span id="cookieStatusLabel">Cookie</span>
      </button>
    </div>
    <div role="tablist" class="tabs tabs-bordered mb-6">
      <a role="tab" class="tab ${active === 'live' ? 'tab-active' : ''}" onclick="navigate('#/')">直播录制</a>
      <a role="tab" class="tab ${active === 'local' ? 'tab-active' : ''}" onclick="navigate('#/local')">本地视频</a>
    </div>`;
}

// ── Cookie 设置 ───────────────────────────────────────────────────────────────
async function refreshCookieStatus() {
  try {
    const r = await fetch('/api/settings/cookies');
    if (!r.ok) return;
    const d = await r.json();
    const el = document.getElementById('cookieStatusLabel');
    if (el) el.textContent = d.status === '已登录' ? '已登录' : (d.status === '匿名' ? 'Cookie(匿名)' : 'Cookie');
  } catch(e) {}
}

function openCookieSettings() {
  let modal = document.getElementById('cookieModal');
  if (!modal) {
    modal = document.createElement('dialog');
    modal.id = 'cookieModal';
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-box w-full max-w-2xl">
        <h3 class="font-bold text-lg mb-3">设置</h3>

        <div class="divider text-xs opacity-50 my-2">Cookie</div>
        <p class="text-xs opacity-50 mb-2">在 Chrome 打开 live.douyin.com → F12 → Console 粘贴：<code class="bg-base-300 px-1">copy(document.cookie)</code>，然后粘贴到下方</p>
        <div id="ckStatus" class="text-sm mb-2 opacity-60"></div>
        <textarea id="ckInput" class="textarea textarea-bordered w-full font-mono text-xs" rows="5" placeholder="ttwid=...; sessionid=...; uid_tt=..."></textarea>
        <div class="flex gap-2 mt-2">
          <button class="btn btn-primary btn-sm" onclick="saveCookieSettings()">保存 Cookie</button>
        </div>

        <div class="divider text-xs opacity-50 my-3">流地址获取方式</div>
        <div id="spiderStatus" class="text-xs opacity-50 mb-2"></div>
        <select id="spiderMethodSelect" class="select select-bordered select-sm w-full" onchange="saveSpiderMethod()"></select>

        <div class="modal-action mt-4">
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('cookieModal').close()">关闭</button>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop"><button>close</button></form>
    `;
    document.body.appendChild(modal);
  }
  // 加载当前 cookie 状态
  fetch('/api/settings/cookies').then(r => r.json()).then(d => {
    document.getElementById('ckStatus').textContent = `当前状态: ${d.status}（${d.length} 字符）`;
  }).catch(() => {});
  document.getElementById('ckInput').value = '';
  // 加载 spider 方法选项
  fetch('/api/settings/spider').then(r => r.json()).then(d => {
    const sel = document.getElementById('spiderMethodSelect');
    sel.innerHTML = d.methods.map(m =>
      `<option value="${m.value}" ${m.value === d.method ? 'selected' : ''}>${m.label}</option>`
    ).join('');
    document.getElementById('spiderStatus').textContent = `当前: ${d.method}`;
  }).catch(() => {});
  modal.showModal();
}

async function saveSpiderMethod() {
  const method = document.getElementById('spiderMethodSelect').value;
  const r = await fetch('/api/settings/spider', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method }),
  });
  const d = await r.json();
  if (!r.ok) { alert(d.error || '保存失败'); return; }
  document.getElementById('spiderStatus').textContent = `已保存: ${d.method}`;
}

async function saveCookieSettings() {
  const cookies = document.getElementById('ckInput').value.trim();
  if (!cookies) { alert('请输入 Cookie'); return; }
  const r = await fetch('/api/settings/cookies', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cookies }),
  });
  const d = await r.json();
  if (!r.ok) { alert(d.error || '保存失败'); return; }
  document.getElementById('ckStatus').textContent = `已保存: ${d.status}（保留 ${d.kept}/${d.total} 个字段，${d.length} 字符）`;
  document.getElementById('ckInput').value = '';
  await refreshCookieStatus();
  setTimeout(() => document.getElementById('cookieModal')?.close(), 1200);
}

// ── 直播录制列表视图 ──────────────────────────────────────
function renderListView() {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${tabsHTML('live')}

    <div class="card bg-base-200 shadow-md mb-6">
      <div class="card-body p-5">
        <div class="form-control mb-3">
          <label class="label py-1"><span class="label-text">直播间 URL</span></label>
          <input id="url" type="text" placeholder="https://live.douyin.com/xxxxxxxxx" class="input input-bordered input-sm w-full" />
        </div>
        <div class="form-control mb-3">
          <label class="label py-0"><span class="label-text opacity-70">文件夹名（选填，留空则用主播名）</span></label>
          <input id="customName" type="text" placeholder="自定义目录名，如：小花妹妹" class="input input-bordered input-sm w-full" />
        </div>
        <div class="grid grid-cols-3 gap-3 mb-3">
          <div class="form-control">
            <label class="label py-1"><span class="label-text">画质</span></label>
            <select id="quality" class="select select-bordered select-sm w-full">
              <option value="origin">OD（原画）</option>
              <option value="uhd" selected>UHD（蓝光）</option>
              <option value="hd">HD（高清）</option>
              <option value="sd">SD（标清）</option>
              <option value="ld">LD（流畅）</option>
            </select>
          </div>
          <div class="form-control">
            <label class="label py-1"><span class="label-text">分段时间 (秒)</span></label>
            <input id="segmentSec" type="number" value="1800" min="0" step="60" class="input input-bordered input-sm w-full" />
          </div>
          <div class="form-control">
            <label class="label py-1"><span class="label-text">循环检测 (秒)</span></label>
            <input id="pollInterval" type="number" value="180" min="10" step="10" class="input input-bordered input-sm w-full" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div class="form-control">
            <label class="label py-1"><span class="label-text">网络线程数</span></label>
            <input id="maxThreads" type="number" value="3" min="1" max="10" step="1" class="input input-bordered input-sm w-full" />
          </div>
        </div>
        <div class="flex items-center gap-5 mb-4 flex-wrap">
          <label class="label cursor-pointer gap-2">
            <input type="checkbox" id="chkRecord" checked class="checkbox checkbox-sm checkbox-primary" />
            <span class="label-text">录制</span>
          </label>
          <label class="label cursor-pointer gap-2">
            <input type="checkbox" id="chkScreenshot" class="checkbox checkbox-sm checkbox-warning" />
            <span class="label-text">截图</span>
          </label>
          <label class="label cursor-pointer gap-2">
            <input type="checkbox" id="chkSegment" checked class="checkbox checkbox-sm" />
            <span class="label-text">分段录制</span>
          </label>
          <label class="label cursor-pointer gap-2">
            <input type="checkbox" id="chkDanmu" class="checkbox checkbox-sm checkbox-info" />
            <span class="label-text">录制弹幕</span>
          </label>
          <label class="label cursor-pointer gap-2">
            <input type="checkbox" id="chkQualityFallback" class="checkbox checkbox-sm checkbox-warning" />
            <span class="label-text" title="ByteVC1/H265 崩溃时自动降级画质重试 (UHD→HD→SD→LD)">兼容模式</span>
          </label>
          <label class="label cursor-pointer gap-2">
            <input type="checkbox" id="chkCountdown" checked class="checkbox checkbox-sm" />
            <span class="label-text">显示循环倒计时</span>
          </label>
          <label class="label cursor-pointer gap-2">
            <input type="checkbox" id="chkSchedule" class="checkbox checkbox-sm checkbox-accent" onchange="toggleScheduleInputs()" />
            <span class="label-text">启用定时</span>
          </label>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-3 hidden" id="scheduleRow">
          <div class="form-control">
            <label class="label py-1"><span class="label-text">时区</span></label>
            <select id="scheduleTz" class="select select-bordered select-sm w-full">
              <option value="America/Los_Angeles">America/Los_Angeles</option>
              <option value="America/New_York">America/New_York</option>
              <option value="Asia/Shanghai">Asia/Shanghai</option>
              <option value="Asia/Tokyo">Asia/Tokyo</option>
              <option value="Asia/Hong_Kong">Asia/Hong_Kong</option>
              <option value="Europe/London">Europe/London</option>
              <option value="UTC">UTC</option>
            </select>
          </div>
          <div class="form-control">
            <label class="label py-1"><span class="label-text">开始时间</span></label>
            <input id="scheduleStart" type="time" value="20:00" class="input input-bordered input-sm w-full" />
          </div>
          <div class="form-control">
            <label class="label py-1"><span class="label-text">停止时间</span></label>
            <input id="scheduleStop" type="time" value="02:00" class="input input-bordered input-sm w-full" />
          </div>
          <div class="col-span-1 mt-1">
            <label class="label cursor-pointer gap-2 py-0">
              <input type="checkbox" id="chkRunUntilEnd" class="checkbox checkbox-sm" />
              <span class="label-text">直到直播结束（忽略停止时间，等直播自然断开后停止）</span>
            </label>
          </div>
        </div>
        <button class="btn btn-primary btn-sm w-full" id="btnAdd">添加任务</button>

    <div id="taskTableWrap"></div>
  `;

  document.getElementById('btnAdd').addEventListener('click', addTask);
  document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  refreshTaskList();
  refreshCookieStatus();
  pollTimer = setInterval(refreshTaskList, 2000);
  timeUpdateTimer = setInterval(updateElapsedTimes, 1000);
}

function toggleScheduleInputs() {
  const chk = document.getElementById('chkSchedule');
  const row = document.getElementById('scheduleRow');
  if (row) row.classList.toggle('hidden', !chk.checked);
}

async function addTask() {
  const url = document.getElementById('url').value.trim();
  if (!url) { alert('请输入直播间 URL'); return; }
  const chkRecord = document.getElementById('chkRecord');
  const chkScreenshot = document.getElementById('chkScreenshot');
  if (!chkRecord.checked && !chkScreenshot.checked) { alert('请至少勾选「录制」或「截图」'); return; }
  const btnAdd = document.getElementById('btnAdd');
  btnAdd.disabled = true;
  btnAdd.innerHTML = '<span class="loading loading-spinner loading-xs"></span> 添加中...';
  try {
    const segmentSec = parseInt(document.getElementById('segmentSec').value) || 1800;
    const scheduleEnabled = document.getElementById('chkSchedule').checked;
    const payload = {
      url,
      custom_name: document.getElementById('customName').value.trim() || null,
      quality: document.getElementById('quality').value,
      segment: Math.floor(segmentSec / 60),
      record: chkRecord.checked, screenshot: chkScreenshot.checked,
      enable_danmu: document.getElementById('chkDanmu').checked,
      auto_quality_fallback: document.getElementById('chkQualityFallback').checked,
      enable_segment: document.getElementById('chkSegment').checked,
      segment_sec: segmentSec,
      poll_interval: parseInt(document.getElementById('pollInterval').value) || 180,
      show_countdown: document.getElementById('chkCountdown').checked,
      max_threads: parseInt(document.getElementById('maxThreads').value) || 3,
      schedule_enabled: scheduleEnabled,
    };
    if (scheduleEnabled) {
      payload.schedule_timezone = document.getElementById('scheduleTz').value;
      payload.schedule_start = document.getElementById('scheduleStart').value;
      payload.schedule_stop = document.getElementById('scheduleStop').value;
      payload.schedule_run_until_end = document.getElementById('chkRunUntilEnd').checked;
    }
    const r = await fetch('/api/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (!r.ok) { alert(d.error); btnAdd.disabled = false; btnAdd.innerHTML = '添加任务'; return; }
    document.getElementById('url').value = '';
    document.getElementById('customName').value = '';
    refreshTaskList();
  } catch (e) { alert('请求失败: ' + e.message); }
  finally { btnAdd.disabled = false; btnAdd.innerHTML = '添加任务'; }
}

async function refreshTaskList() {
  try {
    const r = await fetch('/api/tasks');
    const d = await r.json();
    if (!tryUpdateTasksInPlace(d.tasks)) {
      renderTaskTable(d.tasks);
      updateElapsedTimes();
    }
  } catch {}
}

function taskStatusCellHTML(t) {
  const sd = statusDisplay(t.status, t.worker_status);
  const workerInfo = (t.worker_status && t.worker_status !== '定时等待') ? `<span class="text-xs opacity-50 ml-1">· ${esc(t.worker_status)}</span>` : '';
  const elapsedPart = t.status === 'running' && t.started_at
    ? `<div class="text-xs opacity-40 mt-0.5">运行 ${formatElapsed(t.started_at)}${t.recording_started_at ? ` · 录制 ${formatElapsed(t.recording_started_at)}` : ''}</div>`
    : '';
  return `<span class="badge ${sd.badgeClass} badge-sm gap-1"><span class="inline-block w-1.5 h-1.5 rounded-full ${sd.dotClass}"></span>${sd.label}</span>${workerInfo}${elapsedPart}`;
}

function taskActionsCellHTML(t) {
  const canStart = t.status === 'pending' || t.status === 'stopped' || t.status === 'error';
  const canStop = t.status === 'running';
  const canDelete = t.status !== 'running';
  return `<div class="flex gap-1">${canStart ? `<button class="btn btn-success btn-outline btn-xs" onclick="listAction('start',${t.id},this)">启动</button>` : ''}${canStop ? `<button class="btn btn-error btn-outline btn-xs" onclick="listAction('stop',${t.id},this)">停止</button>` : ''}<button class="btn btn-info btn-outline btn-xs" onclick="navigate('#/task/${t.id}')">详情</button>${canDelete ? `<button class="btn btn-ghost btn-xs text-error" onclick="listDelete(${t.id},this)">删除</button>` : ''}</div>`;
}

function tryUpdateTasksInPlace(tasks) {
  const wrap = document.getElementById('taskTableWrap');
  if (!wrap) return false;
  const tbody = wrap.querySelector('tbody');
  if (!tbody) return false;
  const existingRows = [...tbody.querySelectorAll('tr[data-id]')];
  if (existingRows.length !== (tasks || []).length) return false;
  const existingIds = existingRows.map(r => parseInt(r.dataset.id));
  const newIds = (tasks || []).map(t => t.id);
  if (existingIds.join(',') !== newIds.join(',')) return false;
  (tasks || []).forEach(t => {
    const statusEl = document.getElementById(`task-status-${t.id}`);
    const actionsEl = document.getElementById(`task-actions-${t.id}`);
    if (statusEl) statusEl.innerHTML = taskStatusCellHTML(t);
    if (actionsEl) actionsEl.innerHTML = taskActionsCellHTML(t);
  });
  updateElapsedTimes();
  return true;
}

function renderTaskTable(tasks) {
  const wrap = document.getElementById('taskTableWrap');
  if (!wrap) return;
  if (!tasks || tasks.length === 0) {
    wrap.innerHTML = '<div class="text-center py-12 text-base-content/50">暂无任务，请添加直播间 URL</div>';
    return;
  }

  const rows = tasks.map(t => {
    const displayName = t.name || t.url;
    const features = [];
    if (t.enable_record) features.push('<span class="badge badge-success badge-outline badge-xs">录制</span>');
    if (t.enable_screenshot) features.push('<span class="badge badge-warning badge-outline badge-xs">截图</span>');
    if (t.enable_danmu) features.push('<span class="badge badge-info badge-outline badge-xs">弹幕</span>');
    if (t.auto_quality_fallback) features.push('<span class="badge badge-warning badge-outline badge-xs">兼容</span>');
    if (t.schedule_enabled) features.push(`<span class="badge badge-accent badge-outline badge-xs">定时 ${t.schedule_start}~${t.schedule_stop}</span>`);

    return `<tr class="clickable hover" data-id="${t.id}">
      <td class="text-base-content/50 font-mono">${t.id}</td>
      <td>

async function loadSegments(taskId) {
  const el = document.getElementById('segmentsList');
  if (!el) return;
  try {
    const r = await fetch(`/api/tasks/${taskId}/segments`);
    const d = await r.json();
    if (!d.groups?.length) {
      el.innerHTML = '<span class="opacity-40 text-xs">暂无录制组</span>';
      return;
    }
    // 按日期分组
    const byDate = {};
    for (const g of d.groups) {
      const date = g.date || '未知日期';
      (byDate[date] = byDate[date] || []).push(g);
    }
    const recording = d.is_running;
    el.innerHTML = Object.entries(byDate).map(([date, groups]) => `
      <div class="mb-2 last:mb-0">
        <div class="text-xs font-semibold opacity-40 mb-1 pt-1">${esc(date)}</div>
        ${groups.map(g => `
          <div class="py-1 pl-3 border-b border-base-300 last:border-0">
            <div class="flex flex-wrap items-center gap-2">
              <span class="font-mono text-xs w-20 shrink-0 opacity-80">${esc(g.time || g.prefix)}</span>
              <span class="badge badge-outline badge-xs">${g.segment_count}段</span>
              ${g.has_danmu ? '<span class="badge badge-info badge-outline badge-xs">弹幕</span>' : ''}
              ${g.merging
                ? `<div class="flex items-center gap-2">
                    <span class="badge badge-warning badge-xs gap-1">
                      <span class="loading loading-spinner loading-xs"></span>
                      ${g.burn_progress > 0 ? g.burn_progress + '%' : '合并中'}
                    </span>
                    ${g.burn_progress > 0
                      ? `<progress class="progress progress-warning w-24 h-1.5" value="${g.burn_progress}" max="100"></progress>`
                      : ''}
                  </div>`
                : g.merged
                  ? '<span class="badge badge-success badge-outline badge-xs">已合并</span>'
                  : `<button class="btn btn-xs btn-outline"
                       data-task="${taskId}" data-prefix="${esc(g.prefix)}" data-danmu="false"
                       onclick="mergeGroup(this)">合并</button>`
              }
              ${g.has_danmu && !g.danmu_merged && !g.merging
                ? `<button class="btn btn-xs btn-outline btn-info"
                     data-task="${taskId}" data-prefix="${esc(g.prefix)}" data-danmu="true"
                     onclick="mergeGroup(this)">烧录弹幕</button>`
                : (g.danmu_merged ? '<span class="badge badge-info badge-xs">弹幕已合并</span>' : '')
              }
            </div>
            ${g.merge_error ? `<div class="text-xs text-error mt-1 break-all opacity-80">${esc(g.merge_error)}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `).join('');
    // 若有进行中的合并，自动继续轮询
    if (d.groups?.some(g => g.merging)) {
      setTimeout(() => loadSegments(taskId), 1500);
    }
  } catch {
    el.innerHTML = '<span class="text-error text-xs">加载失败</span>';
  }
}

async function mergeGroup(btn) {
  const taskId = btn.dataset.task;
  const prefix = btn.dataset.prefix;
  const burnDanmu = btn.dataset.danmu === 'true';
  btn.disabled = true;
  btn.textContent = '启动中...';
  try {
    const r = await fetch(`/api/tasks/${taskId}/merge`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prefix, burn_danmu: burnDanmu }),
    });
    const d = await r.json();
    if (!r.ok) {
      alert(d.error);
      btn.disabled = false;
      btn.textContent = burnDanmu ? '烧录弹幕' : '合并';
      return;
    }
    btn.textContent = burnDanmu ? '烧录中...' : '合并中...';
    // 每 3 秒轮询一次，直到不再 merging（最多 10 分钟）
    let polls = 0;
    const maxPolls = 200;
    const pollMerge = setInterval(async () => {
      polls++;
      if (polls > maxPolls) { clearInterval(pollMerge); loadSegments(taskId); return; }
      try {
        const pr = await fetch(`/api/tasks/${taskId}/segments`);
        const pd = await pr.json();
        const pg = pd.groups?.find(x => x.prefix === prefix);
        if (!pg || !pg.merging) { clearInterval(pollMerge); loadSegments(taskId); }
      } catch { clearInterval(pollMerge); }
    }, 1500);
  } catch (e) {
    alert(e.message);
    btn.disabled = false;
    btn.textContent = burnDanmu ? '烧录弹幕' : '合并';
  }
}

async function toggleDetailPreview(id, name) {
  const btn = document.getElementById('btnPreviewToggle');
  const box = document.getElementById('previewBox');
  const img = document.getElementById('previewImg');
  const noSignal = document.getElementById('noSignal');
  const label = document.getElementById('previewLabel');

  if (detailPreviewActive) {
    try { await fetch(`/api/tasks/${id}/preview`, { method: 'POST' }); } catch {}
    detailPreviewActive = false;
    if (img) { img.src = ''; img.classList.add('hidden'); }
    if (box) box.classList.add('hidden');
    if (btn) { btn.textContent = '开启预览'; btn.classList.remove('btn-active'); }
  } else {
    try {
      const r = await fetch(`/api/tasks/${id}/preview`, { method: 'POST' });
      const d = await r.json();
      if (!d.previewing) await fetch(`/api/tasks/${id}/preview`, { method: 'POST' });
    } catch {}
    detailPreviewActive = true;
    if (box) box.classList.remove('hidden');
    if (img) {
      img.src = '/api/preview?' + Date.now();
      img.classList.remove('hidden');
      if (noSignal) noSignal.classList.add('hidden');
      if (label) label.classList.remove('hidden');
      img.onerror = () => {
        img.classList.add('hidden');
        if (noSignal) { noSignal.textContent = '等待画面...'; noSignal.classList.remove('hidden'); }
      };
    }
    if (btn) { btn.textContent = '关闭预览'; btn.classList.add('btn-active'); }
  }
}

async function loadLogsAndConnect(id) {
  _initLogScroll();
  const logs = document.getElementById('logs');
  try {
    const r = await fetch(`/api/tasks/${id}/logs/history`);
    if (r.ok) {
      const d = await r.json();
      if (d.lines && d.lines.length > 0 && logs) {
        logs.textContent = d.lines.join('\n') + '\n';
        logs.scrollTop = logs.scrollHeight;
      }
    }
  } catch {}
  connectTaskSSE(id);
}

function connectTaskSSE(id) {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(`/api/tasks/${id}/logs`);
  evtSource.onmessage = e => { _appendLog(e.data); };
  evtSource.onerror = () => { if (currentView === 'detail') setTimeout(() => connectTaskSSE(id), 2000); };
}

let _detailLastStatus = null;
async function refreshDetailStatus(id) {
  try {
    const r = await fetch(`/api/tasks/${id}`);
    if (!r.ok) return;
    const task = await r.json();
    const canStart = task.status === 'pending' || task.status === 'stopped' || task.status === 'error';
    const canStop = task.status === 'running';
    const canDelete = task.status !== 'running';
    const actions = document.getElementById('detailActions');
    if (actions) {
      actions.innerHTML = `
        ${canStart ? `<button class="btn btn-success btn-outline btn-sm" onclick="detailAction('start',${id},this)">启动</button>` : ''}
        ${canStop ? `<button class="btn btn-error btn-outline btn-sm" onclick="detailAction('stop',${id},this)">停止</button>` : ''}
        ${canDelete ? `<button class="btn btn-ghost btn-sm text-error" onclick="detailDelete(${id},this)">删除</button>` : ''}
      `;
    }
    // Reload segments when task transitions out of running (file writing complete)
    if (_detailLastStatus === 'running' && task.status !== 'running') {
      loadSegments(id);
    }
    _detailLastStatus = task.status;
    // Update time rows
    const timeRow = document.getElementById('detailTimeRow');
    const startedEl = document.getElementById('detailStartedEl');
    const recordingDiv = document.getElementById('detailRecordingDiv');
    const recordingEl = document.getElementById('detailRecordingEl');
    if (timeRow) timeRow.classList.toggle('hidden', !task.started_at);
    if (startedEl) startedEl.dataset.elapsedFrom = task.started_at || '';
    if (recordingEl) recordingEl.dataset.elapsedFrom = task.recording_started_at || '';
    if (recordingDiv) recordingDiv.classList.toggle('hidden', !task.recording_started_at);
  } catch {}
}

  const payload = { video_path: videoPath, task_type: taskType };
  if (taskType === 'highlight') {
    const aiBackendEl = document.querySelector('input[name="aiBackend"]:checked');
    if (aiBackendEl) payload.ai_backend = aiBackendEl.value;
  }
  try {
    const r = await fetch('/api/local/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (!r.ok) { alert(d.error); return; }
    document.getElementById('localPath').value = '';
    refreshLocalTaskList();
  } catch (e) { alert('请求失败: ' + e.message); }
}

async function refreshLocalTaskList() {
  try { const r = await fetch('/api/local/tasks'); const d = await r.json(); renderLocalTaskTable(d.tasks); } catch {}
}

function renderLocalTaskTable(tasks) {
  const wrap = document.getElementById('localTaskTableWrap');
  if (!wrap) return;
  if (!tasks || tasks.length === 0) {
    wrap.innerHTML = '<div class="text-center py-12 text-base-content/50">暂无本地视频任务</div>';
    return;
  }

  const rows = tasks.map(t => {
    const canStart = t.status === 'pending' || t.status === 'error';
    const canStop = t.status === 'running';
    const canDelete = t.status !== 'running';
    const displayName = t.name || t.video_path;
    const typeLabel = LOCAL_TYPE_LABELS[t.task_type] || t.task_type;

    const dotClass = t.status === 'running' ? 'bg-success dot-running'
                   : t.status === 'completed' ? 'bg-info'
                   : t.status === 'error' ? 'bg-error'
                   : 'bg-base-content/40';

    const progressBar = t.status === 'running'
      ? `<progress class="progress progress-primary w-24 h-2" value="${t.progress}" max="100"></progress>
         <span class="text-xs opacity-50 ml-1">${Math.round(t.progress)}%</span>`
      : (t.result_summary ? `<span class="text-xs opacity-60">${esc(t.result_summary)}</span>` : '');

    return `<tr class="clickable hover" data-id="${t.id}">
      <td class="text-base-content/50 font-mono">${t.id}</td>
      <td>
        <div class="font-semibold text-sm truncate max-w-[200px]">${esc(displayName)}</div>
        <div class="text-xs opacity-40 truncate max-w-[200px]">${esc(t.video_path)}</div>
      </td>
      <td><span class="badge badge-outline badge-sm">${typeLabel}</span></td>
      <td>
        <span class="badge ${STATUS_BADGE[t.status] || 'badge-ghost'} badge-sm gap-1">
          <span class="inline-block w-1.5 h-1.5 rounded-full ${dotClass}"></span>
          ${STATUS_LABELS[t.status] || t.status}
        </span>
      </td>
      <td>${progressBar}</td>
      <td onclick="event.stopPropagation()">
        <div class="flex gap-1">
          ${canStart ? `<button class="btn btn-success btn-outline btn-xs" onclick="localListAction('start',${t.id})">启动</button>` : ''}
          ${canStop ? `<button class="btn btn-error btn-outline btn-xs" onclick="localListAction('stop',${t.id})">停止</button>` : ''}
          <button class="btn btn-info btn-outline btn-xs" onclick="navigate('#/local/task/${t.id}')">详情</button>
          ${canDelete ? `<button class="btn btn-ghost btn-xs text-error" onclick="localListDelete(${t.id})">删除</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `
    <div class="overflow-x-auto rounded-lg border border-base-300">
      <table class="table table-sm">
        <thead><tr><th>#</th><th>名称 / 路径</th><th>类型</th><th>状态</th><th>进度</th><th>操作</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  wrap.querySelectorAll('tr.clickable').forEach(tr => {
    tr.addEventListener('click', () => navigate('#/local/task/' + tr.dataset.id));
  });
}

async function localListAction(action, id) {
  try {
    const r = await fetch(`/api/local/tasks/${id}/${action}`, { method: 'POST' });
    if (!r.ok) { const d = await r.json(); alert(d.error); }
    refreshLocalTaskList();
  } catch (e) { alert(e.message); }
}

async function localListDelete(id) {
  if (!confirm('确认删除此任务？')) return;
  try {
    const r = await fetch(`/api/local/tasks/${id}`, { method: 'DELETE' });
    if (!r.ok) { const d = await r.json(); alert(d.error); }
    refreshLocalTaskList();
  } catch (e) { alert(e.message); }
}

// ── 本地视频详情 ──────────────────────────────────────────
async function renderLocalDetailView(id) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="flex justify-center py-20"><span class="loading loading-spinner loading-md"></span></div>';

  let task;
  try {
    const r = await fetch(`/api/local/tasks/${id}`);
    if (!r.ok) { app.innerHTML = '<div class="text-center py-16 text-base-content/50">任务不存在 — <a class="link link-primary" href="#/local">返回列表</a></div>'; return; }
    task = await r.json();
  } catch { app.innerHTML = '<div class="text-center py-16 text-base-content/50">加载失败 — <a class="link link-primary" href="#/local">返回列表</a></div>'; return; }

  const canStart = task.status === 'pending' || task.status === 'error';
  const canStop = task.status === 'running';
  const canDelete = task.status !== 'running';
  const displayName = task.name || '未命名';
  const typeLabel = LOCAL_TYPE_LABELS[task.task_type] || task.task_type;
  const createdDate = task.created_at ? task.created_at.split('T')[0] : '-';

  const dotClass = task.status === 'running' ? 'bg-success dot-running'
                 : task.status === 'completed' ? 'bg-info'
                 : task.status === 'error' ? 'bg-error'
                 : 'bg-base-content/40';

  app.innerHTML = `
    <div class="flex items-center gap-3 mb-5">
      <a href="#/local" class="btn btn-ghost btn-sm gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>返回</a>
      <h2 class="text-xl font-bold">#${task.id} ${esc(displayName)}</h2>
    </div>

    <div class="card bg-base-200 shadow-md mb-4">
      <div class="card-body p-5 gap-3">
        <div class="flex flex-wrap items-center gap-x-6 gap-y-1 text-sm">
          <div><span class="opacity-50 mr-1">文件</span> <span class="break-all">${esc(task.video_path)}</span></div>
        </div>
        <div class="flex flex-wrap items-center gap-x-6 gap-y-1 text-sm">
          <div><span class="opacity-50 mr-1">类型</span> <span class="badge badge-sm badge-outline">${typeLabel}</span></div>
          <div><span class="opacity-50 mr-1">创建</span> ${createdDate}</div>
          ${task.finished_at ? `<div><span class="opacity-50 mr-1">完成</span> ${task.finished_at.split('T')[0]}</div>` : ''}
        </div>
        <div class="flex flex-wrap items-center gap-x-6 gap-y-1 text-sm">
          <div>
            <span class="opacity-50 mr-1">状态</span>
            <span class="badge ${STATUS_BADGE[task.status] || 'badge-ghost'} badge-sm gap-1">
              <span class="inline-block w-1.5 h-1.5 rounded-full ${dotClass}"></span>
              ${STATUS_LABELS[task.status] || task.status}
            </span>
          </div>
        </div>
        <div class="mt-1" id="localProgressWrap">
          <progress class="progress progress-primary w-full h-3" value="${task.progress}" max="100" id="localProgressBar"></progress>
          <div class="text-xs opacity-60 mt-1" id="localProgressText">${esc(task.progress_text) || Math.round(task.progress) + '%'}</div>
        </div>
        ${task.result_summary ? `<div class="text-sm"><span class="opacity-50 mr-1">结果</span> ${esc(task.result_summary)}</div>` : ''}
        ${task.error_msg ? `<div class="text-sm text-error"><span class="opacity-50 mr-1">错误</span> ${esc(task.error_msg)}</div>` : ''}
        <div class="flex gap-2 mt-1" id="localDetailActions">
          ${canStart ? `<button class="btn btn-success btn-outline btn-sm" onclick="localDetailAction('start',${id})">启动</button>` : ''}
          ${canStop ? `<button class="btn btn-error btn-outline btn-sm" onclick="localDetailAction('stop',${id})">停止</button>` : ''}
          ${canDelete ? `<button class="btn btn-ghost btn-sm text-error" onclick="localDetailDelete(${id})">删除</button>` : ''}
        </div>
      </div>
    </div>

    <div class="log-box bg-base-300 rounded-lg p-3 h-72 overflow-y-auto text-base-content/70" id="logs"></div>
  `;

  loadLocalLogsAndConnect(id);
  pollTimer = setInterval(() => refreshLocalDetailStatus(id), 2000);
}

async function loadLocalLogsAndConnect(id) {
  _initLogScroll();
  const logs = document.getElementById('logs');
  try {
    const r = await fetch(`/api/local/tasks/${id}/logs/history`);
    if (r.ok) {
      const d = await r.json();
      if (d.lines && d.lines.length > 0 && logs) {
        logs.textContent = d.lines.join('\n') + '\n';
        logs.scrollTop = logs.scrollHeight;
      }
    }
  } catch {}
  connectLocalTaskSSE(id);
}

function connectLocalTaskSSE(id) {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(`/api/local/tasks/${id}/logs`);
  evtSource.onmessage = e => { _appendLog(e.data); };
  evtSource.onerror = () => { if (currentView === 'local-detail') setTimeout(() => connectLocalTaskSSE(id), 2000); };
}

async function refreshLocalDetailStatus(id) {
  try {
    const r = await fetch(`/api/local/tasks/${id}`);
    if (!r.ok) return;
    const task = await r.json();
    const canStart = task.status === 'pending' || task.status === 'error';
    const canStop = task.status === 'running';
    const canDelete = task.status !== 'running';

    const bar = document.getElementById('localProgressBar');
    const text = document.getElementById('localProgressText');
    if (bar) bar.value = task.progress;
    if (text) text.textContent = task.progress_text || Math.round(task.progress) + '%';

    const actions = document.getElementById('localDetailActions');
    if (actions) {
      actions.innerHTML = `
        ${canStart ? `<button class="btn btn-success btn-outline btn-sm" onclick="localDetailAction('start',${id})">启动</button>` : ''}
        ${canStop ? `<button class="btn btn-error btn-outline btn-sm" onclick="localDetailAction('stop',${id})">停止</button>` : ''}
        ${canDelete ? `<button class="btn btn-ghost btn-sm text-error" onclick="localDetailDelete(${id})">删除</button>` : ''}
      `;
    }
  } catch {}
}

async function localDetailAction(action, id) {
  try {
    const r = await fetch(`/api/local/tasks/${id}/${action}`, { method: 'POST' });
    if (!r.ok) { const d = await r.json(); alert(d.error); }
    refreshLocalDetailStatus(id);
  } catch (e) { alert(e.message); }
}

async function localDetailDelete(id) {
  if (!confirm('确认删除此任务？')) return;
  try {
    const r = await fetch(`/api/local/tasks/${id}`, { method: 'DELETE' });
    if (!r.ok) { const d = await r.json(); alert(d.error); return; }
    navigate('#/local');
  } catch (e) { alert(e.message); }
}

// ══════════════════════════════════════════════════════════
// ── 文件浏览器 ───────────────────────────────────────────
// ══════════════════════════════════════════════════════════

function openFileBrowser() {
  // 如果 modal 已存在，复用
  let modal = document.getElementById('fileBrowserModal');
  if (!modal) {
    modal = document.createElement('dialog');
    modal.id = 'fileBrowserModal';
    modal.className = 'modal';
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div class="modal-box max-w-2xl max-h-[80vh] flex flex-col">
      <h3 class="font-bold text-lg mb-3">选择视频文件</h3>
      <div class="flex gap-2 mb-3">
        <input id="fbPathInput" type="text" class="input input-bordered input-sm flex-1" placeholder="输入路径后回车" />
        <button class="btn btn-sm btn-outline" onclick="fbGoTo()">前往</button>
      </div>
      <div class="flex-1 overflow-y-auto border border-base-300 rounded-lg" id="fbList">
        <div class="flex justify-center py-8"><span class="loading loading-spinner loading-sm"></span></div>
      </div>
      <div class="modal-action">
        <button class="btn btn-sm btn-ghost" onclick="document.getElementById('fileBrowserModal').close()">取消</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  `;
  modal.showModal();
  document.getElementById('fbPathInput').addEventListener('keydown', e => { if (e.key === 'Enter') fbGoTo(); });

  // 初始路径：输入框已有的值 或 ~
  const existing = document.getElementById('localPath')?.value.trim();
  let startPath = '~';
  if (existing) {
    // 尝试取目录部分
    const lastSlash = existing.lastIndexOf('/');
    startPath = lastSlash > 0 ? existing.substring(0, lastSlash) : existing;
  }
  fbNavigate(startPath);
}

async function fbNavigate(path) {
  const list = document.getElementById('fbList');
  const pathInput = document.getElementById('fbPathInput');
  if (!list) return;
  list.innerHTML = '<div class="flex justify-center py-8"><span class="loading loading-spinner loading-sm"></span></div>';

  try {
    const r = await fetch(`/api/browse?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if (!r.ok) { list.innerHTML = `<div class="text-center py-8 text-error">${esc(d.error)}</div>`; return; }
    if (d.is_file) {
      fbSelectFile(d.path);
      return;
    }

    if (pathInput) pathInput.value = d.current;

    let html = '';
    // 上级目录
    if (d.parent) {
      html += `<div class="flex items-center gap-2 px-3 py-2 hover:bg-base-200 cursor-pointer border-b border-base-300" onclick="fbNavigate('${escAttr(d.parent)}')">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        <span class="text-sm opacity-60">..</span>
      </div>`;
    }
    // 目录
    for (const dir of d.dirs) {
      html += `<div class="flex items-center gap-2 px-3 py-2 hover:bg-base-200 cursor-pointer border-b border-base-300/50" onclick="fbNavigate('${escAttr(dir.path)}')">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-warning shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" /></svg>
        <span class="text-sm truncate">${esc(dir.name)}</span>
      </div>`;
    }
    // 视频文件
    for (const file of d.files) {
      html += `<div class="flex items-center gap-2 px-3 py-2 hover:bg-base-200 cursor-pointer border-b border-base-300/50" onclick="fbSelectFile('${escAttr(file.path)}')">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-primary shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        <span class="text-sm truncate flex-1">${esc(file.name)}</span>
        <span class="text-xs opacity-40 shrink-0">${file.size}</span>
      </div>`;
    }
    if (!d.dirs.length && !d.files.length) {
      html = '<div class="text-center py-8 text-base-content/50">此目录下没有视频文件</div>';
    }
    list.innerHTML = html;
  } catch (e) {
    list.innerHTML = `<div class="text-center py-8 text-error">加载失败: ${esc(e.message)}</div>`;
  }
}

function fbGoTo() {
  const input = document.getElementById('fbPathInput');
  if (input && input.value.trim()) fbNavigate(input.value.trim());
}

function fbSelectFile(path) {
  const input = document.getElementById('localPath');
  if (input) input.value = path;
  const modal = document.getElementById('fileBrowserModal');
  if (modal) modal.close();
}

function escAttr(s) {
  return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// ── 通用工具 ─────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

</script>

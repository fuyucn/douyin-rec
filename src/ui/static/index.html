<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播录制控制台</title>
<style>
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --accent: #6c8cff; --green: #4caf50; --red: #ef5350; --orange: #ff9800; --text: #e0e0e0; --muted: #888; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem; }
  .layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 1.2rem; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
  h1 { font-size: 1.3rem; margin-bottom: 1rem; color: var(--accent); grid-column: 1 / -1; }

  /* ── 创建任务表单 ── */
  .create-form { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .create-form label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.2rem; }
  .create-form input, .create-form select { width: 100%; padding: 0.45rem 0.6rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; margin-bottom: 0.6rem; }
  .create-form input:focus, .create-form select:focus { outline: none; border-color: var(--accent); }
  .form-row { display: flex; gap: 0.6rem; }
  .form-row > div { flex: 1; }
  .form-checks { display: flex; gap: 1rem; margin: 0.4rem 0 0.6rem; }
  .form-checks label { display: flex; align-items: center; gap: 0.3rem; cursor: pointer; color: var(--text); font-size: 0.82rem; margin: 0; }
  .form-checks input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--accent); }
  #btnAdd { width: 100%; padding: 0.55rem; border: none; border-radius: 6px; font-size: 0.88rem; font-weight: 600; cursor: pointer; background: var(--accent); color: #fff; transition: opacity 0.2s; }
  #btnAdd:hover { opacity: 0.85; }

  /* ── 任务列表 ── */
  .task-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem 1rem; }
  .task-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
  .task-name { font-weight: 600; font-size: 0.95rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-id { font-size: 0.75rem; color: var(--muted); }
  .task-url { font-size: 0.78rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 0.4rem; }
  .task-tags { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .tag { font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 3px; background: var(--border); color: var(--muted); }
  .tag-record { background: #1b3a2a; color: var(--green); }
  .tag-screenshot { background: #3a2a1b; color: var(--orange); }
  .task-status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; margin-bottom: 0.5rem; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  .dot-pending { background: var(--muted); }
  .dot-running { background: var(--green); animation: blink 1s infinite; }
  .dot-stopped { background: var(--red); }
  .dot-error { background: var(--red); }
  @keyframes blink { 50% { opacity: 0.3; } }
  .task-actions { display: flex; gap: 0.4rem; }
  .task-actions button { padding: 0.35rem 0.7rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.78rem; cursor: pointer; background: var(--bg); color: var(--text); transition: all 0.15s; }
  .task-actions button:hover { border-color: var(--accent); }
  .task-actions button:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-start { border-color: var(--green) !important; color: var(--green) !important; }
  .btn-stop { border-color: var(--red) !important; color: var(--red) !important; }
  .btn-preview { border-color: var(--accent) !important; color: var(--accent) !important; }
  .btn-preview.active { background: var(--accent) !important; color: #fff !important; }
  .btn-delete { border-color: var(--red) !important; color: var(--red) !important; }
  .worker-status { font-size: 0.75rem; color: var(--muted); font-style: italic; }

  /* ── 右侧面板 ── */
  .side-panel { display: flex; flex-direction: column; gap: 1rem; }
  .preview-box { background: #000; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; min-height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
  .preview-box img { width: 100%; display: block; }
  .preview-box .no-signal { color: var(--muted); font-size: 0.85rem; }
  .preview-label { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); color: var(--accent); font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 3px; }
  #logs { background: #0a0c10; border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem; height: 300px; overflow-y: auto; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.75rem; line-height: 1.5; white-space: pre-wrap; word-break: break-all; color: #b0b8c8; flex: 1; }
  .empty-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.88rem; }
</style>
</head>
<body>
<div class="layout">
  <h1>直播录制控制台</h1>

  <div class="main-col">
    <!-- 创建任务表单 -->
    <div class="create-form">
      <label for="url">直播间 URL</label>
      <input id="url" type="text" placeholder="https://live.douyin.com/xxxxxxxxx">
      <div class="form-row">
        <div>
          <label for="quality">画质</label>
          <select id="quality">
            <option value="origin">原画 (origin)</option>
            <option value="uhd">蓝光 (uhd)</option>
            <option value="hd">高清 (hd)</option>
            <option value="sd">标清 (sd)</option>
            <option value="ld">流畅 (ld)</option>
          </select>
        </div>
        <div>
          <label for="segment">分段 (分钟)</label>
          <input id="segment" type="number" value="30" min="0" step="1">
        </div>
      </div>
      <div class="form-checks">
        <label><input type="checkbox" id="chkRecord" checked> 录制</label>
        <label><input type="checkbox" id="chkScreenshot"> 截图</label>
      </div>
      <button id="btnAdd">添加任务</button>
    </div>

    <!-- 任务列表 -->
    <div id="taskList" class="task-list">
      <div class="empty-state">暂无任务，请添加直播间 URL</div>
    </div>
  </div>

  <div class="side-panel">
    <!-- 预览区域 -->
    <div class="preview-box" id="previewBox">
      <span class="no-signal" id="noSignal">点击任务「预览」按钮查看画面</span>
      <img id="previewImg" alt="preview" style="display:none" src="">
      <span class="preview-label" id="previewLabel" style="display:none"></span>
    </div>
    <!-- 日志区域 -->
    <div id="logs"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const $url = $('url'), $quality = $('quality'), $segment = $('segment');
const $chkRecord = $('chkRecord'), $chkScreenshot = $('chkScreenshot');
const $taskList = $('taskList');
const $logs = $('logs');
const $previewImg = $('previewImg'), $noSignal = $('noSignal'), $previewLabel = $('previewLabel');

const STATUS_LABELS = {
  pending: '待启动', running: '运行中', stopped: '已停止', error: '错误',
};

let previewingTaskId = null;

// ── 添加任务 ──
$('btnAdd').addEventListener('click', async () => {
  const url = $url.value.trim();
  if (!url) { alert('请输入直播间 URL'); return; }
  if (!$chkRecord.checked && !$chkScreenshot.checked) {
    alert('请至少勾选「录制」或「截图」'); return;
  }
  try {
    const r = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url,
        quality: $quality.value,
        segment: parseInt($segment.value) || 0,
        record: $chkRecord.checked,
        screenshot: $chkScreenshot.checked,
      }),
    });
    const d = await r.json();
    if (!r.ok) { alert(d.error); return; }
    $url.value = '';
    refreshTasks();
  } catch (e) { alert('请求失败: ' + e.message); }
});

// ── 刷新任务列表 ──
async function refreshTasks() {
  try {
    const r = await fetch('/api/tasks');
    const d = await r.json();
    renderTasks(d.tasks);
  } catch {}
}

function renderTasks(tasks) {
  if (!tasks || tasks.length === 0) {
    $taskList.innerHTML = '<div class="empty-state">暂无任务，请添加直播间 URL</div>';
    return;
  }
  $taskList.innerHTML = tasks.map(t => {
    const dotClass = 'dot dot-' + t.status;
    const canStart = t.status === 'pending' || t.status === 'stopped' || t.status === 'error';
    const canStop = t.status === 'running';
    const canDelete = t.status !== 'running';
    const displayName = t.name || t.url;
    const isPreview = t.is_previewing;

    return `<div class="task-card">
      <div class="task-header">
        <span class="task-id">#${t.id}</span>
        <span class="task-name" title="${t.url}">${displayName}</span>
      </div>
      <div class="task-url">${t.url}</div>
      <div class="task-tags">
        ${t.enable_record ? '<span class="tag tag-record">录制</span>' : ''}
        ${t.enable_screenshot ? '<span class="tag tag-screenshot">截图</span>' : ''}
        <span class="tag">${t.quality}</span>
        ${t.segment_min > 0 ? `<span class="tag">${t.segment_min}min</span>` : ''}
      </div>
      <div class="task-status">
        <span class="${dotClass}"></span>
        <span>${STATUS_LABELS[t.status] || t.status}</span>
        ${t.worker_status ? `<span class="worker-status">· ${t.worker_status}</span>` : ''}
        ${t.error_msg ? `<span class="worker-status" style="color:var(--red)">· ${t.error_msg}</span>` : ''}
      </div>
      <div class="task-actions">
        <button class="btn-start" onclick="startTask(${t.id})" ${canStart ? '' : 'disabled'}>启动</button>
        <button class="btn-stop" onclick="stopTask(${t.id})" ${canStop ? '' : 'disabled'}>停止</button>
        <button class="btn-preview ${isPreview ? 'active' : ''}" onclick="togglePreview(${t.id})">预览</button>
        <button class="btn-delete" onclick="deleteTask(${t.id})" ${canDelete ? '' : 'disabled'}>删除</button>
      </div>
    </div>`;
  }).join('');
}

// ── 任务操作 ──
async function startTask(id) {
  try {
    const r = await fetch(`/api/tasks/${id}/start`, { method: 'POST' });
    if (!r.ok) { const d = await r.json(); alert(d.error); }
    refreshTasks();
  } catch (e) { alert(e.message); }
}

async function stopTask(id) {
  try {
    await fetch(`/api/tasks/${id}/stop`, { method: 'POST' });
    refreshTasks();
  } catch (e) { alert(e.message); }
}

async function deleteTask(id) {
  if (!confirm('确认删除此任务？')) return;
  try {
    const r = await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    if (!r.ok) { const d = await r.json(); alert(d.error); }
    refreshTasks();
  } catch (e) { alert(e.message); }
}

async function togglePreview(id) {
  try {
    const r = await fetch(`/api/tasks/${id}/preview`, { method: 'POST' });
    const d = await r.json();
    if (d.previewing) {
      previewingTaskId = id;
      $previewImg.src = '/api/preview?' + Date.now();
      $previewImg.style.display = 'block';
      $noSignal.style.display = 'none';
      $previewLabel.textContent = '任务 #' + id;
      $previewLabel.style.display = 'block';
      $previewImg.onerror = () => {
        $previewImg.style.display = 'none';
        $noSignal.textContent = '等待画面...';
        $noSignal.style.display = 'block';
      };
    } else {
      previewingTaskId = null;
      $previewImg.src = '';
      $previewImg.style.display = 'none';
      $noSignal.textContent = '点击任务「预览」按钮查看画面';
      $noSignal.style.display = 'block';
      $previewLabel.style.display = 'none';
    }
    refreshTasks();
  } catch (e) { alert(e.message); }
}

// ── SSE 日志 ──
let evtSource = null;
function connectSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/api/logs');
  evtSource.onmessage = e => {
    $logs.textContent += e.data + '\n';
    $logs.scrollTop = $logs.scrollHeight;
  };
  evtSource.onerror = () => { setTimeout(connectSSE, 2000); };
}
connectSSE();

// ── 轮询状态 ──
setInterval(refreshTasks, 2000);
refreshTasks();
</script>
</body>
</html>

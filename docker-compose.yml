# douyin-rec 录制服务 — 单容器（Web UI + 定时调度）。
#
# 用法：
#   cp .env.example .env   # 改 TZ / 宿主机路径 / 端口 / Discord
#   # 部署最新版（GIT_SHA 让 About 页显示正确版本号 0.0.0-{commit后6位};不传则 0.0.0-dev）：
#   GIT_SHA=$(git rev-parse HEAD) docker compose up -d --build
#   docker compose logs -f            # 看日志
#   docker compose down               # 停
#
# 数据都在挂载卷上（DB / 录像 / config），容器重建不丢。

services:
  # Tailscale sidecar：容器内 tailscaled，让 docker 当 master 时够得到 VPS（100.x）。
  # 持久化：state 卷 + .env 里 Reusable TS_AUTHKEY → 容器重启不用重认证。
  # douyin-rec 经 network_mode: service:tailscale 共享它的 netns，故 Web UI 端口绑在本服务上。
  tailscale:
    image: tailscale/tailscale:latest
    container_name: drec-tailscale
    hostname: drec-docker            # tailnet 里显示的节点名
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?需在 .env 设置 Reusable auth key}
      TS_STATE_DIR: /var/lib/tailscale   # 持久 state（配合下方卷）
      TS_USERSPACE: "false"              # 内核态 TUN：透明路由（ssh/rsync 直接走），需 NET_ADMIN+/dev/net/tun
      TS_EXTRA_ARGS: --accept-routes
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      # Web UI 端口绑这里（douyin-rec 共享本 netns，不能自带 ports）。
      - "${BIND:-0.0.0.0}:${PORT:-7860}:7860"

  douyin-rec:
    build:
      context: .
      args:
        # 部署命令前缀 GIT_SHA=$(git rev-parse HEAD) 即注入;未设则空 → 版本回落 0.0.0-dev。
        GIT_SHA: "${GIT_SHA:-}"
    image: douyin-rec:latest
    container_name: douyin-rec
    restart: unless-stopped
    # 共享 tailscale sidecar 的网络 → 容器能 ssh 100.x VPS。端口在 tailscale 服务上。
    network_mode: service:tailscale
    depends_on:
      - tailscale
    environment:
      # 调度按本地时间算窗口；默认美西（自动处理 PST/PDT 夏令时），按需改。
      TZ: ${TZ:-America/Los_Angeles}
      # 单一数据根：容器内固定 /output-data（与代码默认根 DEFAULT_ROOT 同名），内部布局固定（不用改）：
      #   /output-data/db/douyin-rec.db · /output-data/recordings · /output-data/config/biliup/cookies.json
      DOUYIN_REC_ROOT: /output-data
      BILIUP_COOKIE: /output-data/config/biliup/cookies.json
      DOUYIN_REC_STATIC: /app/web/dist
      # 可选 Discord 通知 webhook。
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK:-}
    volumes:
      # 单一挂载卷：所有持久数据(db/录像/config)都在它下面，容器重建不丢。宿主机侧目录名(docker-data/)
      # 与容器内挂载点名(/output-data)不必一致——bind mount 只是把这块磁盘的两个入口对上,改容器内
      # 名字不影响宿主机上的文件,也不需要迁移数据。
      - ${DATA_ROOT:-./docker-data}:/output-data
      # VPS ssh key(只读)→ master 经 SshTransport 拉流时认证(配合镜像内 /root/.ssh/config)。
      - ./remote/vps.key:/root/.ssh/vps.key:ro
    # master 模式:serve 带 --hub → 自动读 /output-data/config/hub.config.json(docker-data/config/hub.config.json)。
    command: ["node", "dist/douyin-rec.mjs", "task", "serve", "--port", "7860", "--hub"]

volumes:
  # tailscale 持久 state（节点身份）→ 容器重启免重认证。
  tailscale-state:
